# ═══════════════════════════════════════════════════
# 通用版 Vault — 默认定时任务配置
# ═══════════════════════════════════════════════════
#
# 安装说明：
# 1. 将每个任务复制为 Hermes cronjob
# 2. 替换 {VAULT_ROOT} 为你的 Obsidian Vault 实际路径
# 3. 替换 {DELIVERY} 为你的消息推送地址
# 4. 根据实际需求调整时间和频率
#
# 变量说明：
#   {VAULT_ROOT} = 你的 Obsidian Vault 根目录路径
#   {DELIVERY}   = 消息推送目标（如 "origin" 或 "platform:chat_id"）
#
# ═══════════════════════════════════════════════════

schedules:

  # ─────────────────────────────────────────────
  # 1. 朋友圈内容提醒（上午）
  # ─────────────────────────────────────────────
  - name: "朋友圈提醒-上午"
    schedule: "0 10 * * *"
    prompt: |
      现在是上午10点，请执行朋友圈提醒：

      1. 读取 {VAULT_ROOT}/30-flow/20-私域运营/10-朋友圈/ 目录，检查今天是否已有朋友圈内容
      2. 读取 {VAULT_ROOT}/00-me/10-定位与品牌/品牌风格指南.md 了解语气风格
      3. 如果今天还没有安排内容：
         - 查看昨天发了什么类型（检查最近2-3天的文件名类型标签）
         - 推荐今天适合发的内容类型（避免与昨天重复）
         - 给出1-2个具体的文案方向建议（50字以内的方向描述）
      4. 语气要求：像助理提醒老板一样，轻松随意，不要啰嗦

      如果今天已经有内容安排了，只说"今天朋友圈已安排 ✅"即可，不要重复建议。
    skills:
      - "private-domain"
      - "vault-rules"

  # ─────────────────────────────────────────────
  # 2. 朋友圈内容提醒（下午）
  # ─────────────────────────────────────────────
  - name: "朋友圈提醒-下午"
    schedule: "0 14 * * *"
    prompt: |
      现在是下午2点，请检查朋友圈发布状态：

      1. 读取 {VAULT_ROOT}/30-flow/20-私域运营/10-朋友圈/ 目录
      2. 找到今天（{TODAY}）的文件，检查 status 字段
      3. 如果今天上午的还没发（status 仍然是"草稿"）：
         - 温和提醒"上午那条还没发哦"
      4. 如果今天只发了1条：
         - 简短建议下午可以补一条，给个方向（不需要写全文）
      5. 如果今天已经发了2条以上：不提醒

      保持简短，不要超过3句话。
    skills:
      - "private-domain"

  # ─────────────────────────────────────────────
  # 3. 朋友圈内容提醒（晚上）
  # ─────────────────────────────────────────────
  - name: "朋友圈提醒-晚上"
    schedule: "0 19 * * *"
    prompt: |
      现在是晚上7点，请做今日朋友圈收尾检查：

      1. 读取 {VAULT_ROOT}/30-flow/20-私域运营/10-朋友圈/ 目录
      2. 统计今天（{TODAY}）已发布的内容数量（status: 已发布）
      3. 如果今天发了0-1条：
         - 提醒"今天朋友圈还没怎么发，要不要晚上补一条？"
         - 给一个轻松的文案方向
      4. 如果今天发了2-3条：
         - 说"今天朋友圈已到位 👍"
      5. 如果今天发了4-5条：
         - 说"今天发得不少了，够了够了"
      6. 如果今天发了5条以上：
         - 提醒"今天发太多了，明天悠着点"

      简短随意，像朋友聊天。
    skills:
      - "private-domain"

  # ─────────────────────────────────────────────
  # 4. 每周素材清理提醒（周一上午）
  # ─────────────────────────────────────────────
  - name: "素材清理提醒-周报"
    schedule: "0 9 * * 1"
    prompt: |
      新的一周开始！请执行每周素材清理：

      1. 扫描 {VAULT_ROOT}/10-raw/inbox/ 目录，列出所有文件
      2. 如果 inbox 为空：说"素材库很干净 ✅ 新的一周继续收集！"
      3. 如果有未处理素材：
         - 列出每个文件的文件名和（如果能判断的）大致主题
         - 快速评估每个素材的价值：✅值得提炼 / ⚠️部分有价值 / ❌可删
         - 推荐✅的素材应该提炼到 wiki 的哪个子目录
         - 问用户"要现在挑几个提炼吗？"
      4. 保持简洁，不要展开写内容

      注意：只做评估和建议，不要自动提炼，等用户确认。
    skills:
      - "raw-refine"
      - "vault-rules"

  # ─────────────────────────────────────────────
  # 5. 每周数据回收提醒（周日晚）
  # ─────────────────────────────────────────────
  - name: "数据回收提醒"
    schedule: "0 20 * * 0"
    prompt: |
      周日晚，请提醒用户回收本周内容数据：

      1. 扫描 {VAULT_ROOT}/30-flow/10-公域流量/20-内容管理/ 所有平台目录
      2. 找出本周（最近7天）标记为"已发布"的文件
      3. 检查每个文件是否已有 data_7d 字段
      4. 对于没有数据的已发布文件，列出清单：
         - 文件名
         - 发布平台
         - 发布日期
         - 提示用户报数据（如"公众号那篇阅读量多少？"）
      5. 如果所有已发布文件都有数据：说"本周数据已回收完毕 ✅"

      语气简洁，直接给清单，不要废话。
    skills:
      - "platform-traffic"
      - "vault-rules"

  # ─────────────────────────────────────────────
  # 6. CRM跟进提醒（每周三上午）
  # ─────────────────────────────────────────────
  - name: "CRM跟进提醒"
    schedule: "0 9 * * 3"
    prompt: |
      周三上午，请检查CRM跟进情况：

      1. 扫描 {VAULT_ROOT}/30-flow/30-CRM/10-线索管理/ 目录
      2. 找出 status 为"新线索"或"跟进中"的线索卡
      3. 对每个活跃线索，检查最后一次跟进记录的日期
      4. 根据客户分层给出提醒：
         - A级客户：超过3天没跟进 → 提醒
         - B级客户：超过7天没跟进 → 提醒
         - C级客户：超过14天没跟进 → 提醒
      5. 输出需要跟进的客户清单：
         - 客户名称 + 分级
         - 最后跟进日期
         - 距今天数
         - 简短的跟进建议方向
      6. 如果没有需要跟进的客户：说"CRM一切正常 ✅"

      已成交的客户不需要提醒跟进。
    skills:
      - "crm"
      - "vault-rules"

  # ─────────────────────────────────────────────
  # 7. 选题充足度检查（每周五下午）
  # ─────────────────────────────────────────────
  - name: "选题池检查"
    schedule: "0 15 * * 5"
    prompt: |
      周五下午，请检查选题池状态：

      1. 读取 {VAULT_ROOT}/30-flow/10-公域流量/10-选题池/ 目录
      2. 统计各状态的选题数量：选题中 / 已采用 / Closed
      3. 检查"选题中"的数量：
         - ≥ 10个：说"选题池充足，够写两周了 ✅"
         - 5-9个：说"选题池还行，但建议这周末再补充几个"
         - 1-4个：说"⚠️ 选题快见底了！建议今天集中补一批"
         - 0个：说"🚨 选题池空了！下周没东西发了，赶紧补！"
      4. 如果需要补充选题，给出3-5个选题方向建议（不需要写完整选题卡）
      5. 扫描 {VAULT_ROOT}/10-raw/ 和 {VAULT_ROOT}/20-wiki/ 获取灵感

      简洁直接，重点说需要做什么。
    skills:
      - "platform-traffic"
      - "raw-refine"
      - "vault-rules"
